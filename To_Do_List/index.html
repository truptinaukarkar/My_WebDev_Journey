<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Simple & personalized Todo list</h1>
    <div id="whole">
        <div id="Input-box">
            <input type="text" id="todo-input" placeholder="Enter Task">
            <button id="add-btn">Add</button>
        </div>

        <div id="task-lists">
        <!-- todo list -->
            <div class="lists">
                <h2>Current Tasks:</h2>
                <ul id="todo-list"></ul>
            </div>
            <div class="lists">
                <h2>Completed Tasks:</h2>
                <ul id="completed-todo"></ul>
            </div>
            
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
